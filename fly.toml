# Fly.io config for the API. `app` is the deployed Fly app name; change it if you
# deploy your own instance.
app = "community-energy-flex-api"
primary_region = "lhr"

[build]
  dockerfile = "api/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/v1/health"
